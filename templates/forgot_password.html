{% extends "base.html" %}
{% block title %}Reset Password — Medi-Chat{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-medical-600 rounded-2xl mb-4 shadow-lg">
        <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-800">Medi-Chat</h1>
      <p class="text-gray-500 mt-1 text-sm">Reset your password</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-xl font-semibold text-gray-700 mb-2">Forgot password?</h2>
      <p class="text-sm text-gray-400 mb-6">Enter your email and choose a new password.</p>

      <form method="POST" action="{{ url_for('forgot_password') }}" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Email</label>
          <input type="email" name="email" required
            class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-medical-500 text-sm transition"
            placeholder="you@example.com" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">New password</label>
          <input type="password" name="new_password" required minlength="6"
            class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-medical-500 text-sm transition"
            placeholder="At least 6 characters" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Confirm new password</label>
          <input type="password" name="confirm_password" required minlength="6"
            class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-medical-500 text-sm transition"
            placeholder="Repeat new password" />
        </div>

        <button type="submit"
          class="w-full py-3 bg-medical-600 hover:bg-medical-700 text-white font-semibold rounded-lg transition text-sm shadow">
          Reset Password
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        <a href="{{ url_for('login') }}" class="text-medical-600 font-medium hover:underline flex items-center justify-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          Back to login
        </a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
